name: Collect Data

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing to Supabase (1=yes, 0=no)"
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "0"

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || '' }}
        run: node scripts/collect-data.mjs
